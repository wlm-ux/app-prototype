<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;600;700;800&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
<title>SureShot — My shots</title>
<style>

/* ── Reset ── */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; }
body { background:#0e0e0e; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Work Sans',-apple-system,sans-serif; }

/* ── Phone shell ── */
.phone { position:relative; width:393px; height:852px; border-radius:50px; overflow:hidden; background:#161431; box-shadow:0 0 0 10px #1a1a1a, 0 0 0 12px #2a2a2a, 0 40px 80px rgba(0,0,0,.9); flex-shrink:0; display:flex; flex-direction:column; }

/* ── Status bar ── */
.status-bar { flex-shrink:0; height:54px; display:flex; align-items:center; justify-content:space-between; padding:14px 28px 0; }
.status-time { font-size:17px; font-weight:600; color:#FAF9F9; letter-spacing:-0.3px; }
.status-icons { display:flex; align-items:center; gap:6px; }

/* ── Scroll body ── */
.scroll-body { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.scroll-body::-webkit-scrollbar { display:none; }
.page-content { padding:0 15px 32px; }

/* ── Section header ── */
.section-header { display:flex; align-items:center; justify-content:space-between; padding:16px 0; }
.section-title { font-size:24px; font-weight:800; line-height:30px; color:#F1665C; }

/* ── Event groups ── */
.events-wrap { display:flex; flex-direction:column; gap:32px; }
.event-group { display:flex; flex-direction:column; gap:8px; }
.event-group-header { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.event-group-name { font-size:20px; font-weight:700; line-height:28px; color:#FAF9F9; flex:1; min-width:0; }
.add-videos-btn { display:inline-flex; align-items:center; gap:4px; padding:5px 12px; min-height:32px; border-radius:256px; border:1px solid #F1665C; background:transparent; cursor:pointer; flex-shrink:0; white-space:nowrap; }
.add-videos-btn span { font-size:13px; font-weight:600; color:#F1665C; line-height:20px; }
.add-videos-btn:active { background:rgba(241,102,92,0.1); }
.date-group { display:flex; flex-direction:column; gap:12px; padding:6px 0 0; }
.date-row { display:flex; align-items:center; justify-content:space-between; font-size:14px; font-weight:400; line-height:20px; color:rgba(250,249,249,0.55); }

/* ── Shot grid ── */
.shot-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }

/* ── Shot card — DS Cover component (77×134, p:8px, flex col space-between) ── */
.shot-card-wrap { position:relative; }
.shot-card {
  position:relative; aspect-ratio:77/134; border-radius:4px; overflow:hidden;
  background:#0d0b1e; cursor:pointer;
  transition:transform .18s cubic-bezier(0.34,1.2,0.64,1), opacity .18s;
  will-change:transform;
  display:flex; flex-direction:column; justify-content:space-between; align-items:flex-end;
  padding:8px;
}
.shot-card img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; border-radius:4px; }

/* Duration: bottom-left, Roboto Mono 12px, text-shadow only */
.shot-dur {
  position:relative; z-index:1; align-self:flex-start;
  font-family:'Roboto Mono',monospace; font-size:12px; font-weight:400; line-height:16px;
  color:#FAF9F9; text-shadow:0 0 8px rgba(0,0,0,0.25);
  pointer-events:none; white-space:nowrap;
}

/* Upload status badge: top-right, DS spec */
.shot-badge { position:relative; z-index:1; align-self:flex-end; width:28px; height:28px; border-radius:256px; display:flex; align-items:center; justify-content:center; flex-shrink:0; pointer-events:none; }
.shot-badge.success { background:#98d0bb; }
.shot-badge.loading { background:#FAF9F9; }
.shot-badge.error   { background:#ff7a7a; }
.shot-badge.empty   { background:transparent; }

/* Long-press: lift card, dim siblings */
.shot-card-wrap.pressing .shot-card { transform:scale(1.06); border-radius:6px; box-shadow:0 8px 24px rgba(22,20,49,0.7); }
.shot-grid.has-press .shot-card-wrap:not(.pressing) .shot-card { opacity:0.38; transition:opacity .18s; }

/* ── Mini-preview popup ── */
.mini-preview { position:absolute; z-index:500; width:220px; display:none; flex-direction:column; filter:drop-shadow(0 16px 40px rgba(0,0,0,0.7)); }
.mini-preview.open { display:flex; }
.mp-img-wrap { width:220px; height:300px; border-radius:16px 16px 0 0; overflow:hidden; position:relative; background:#0d0b1e; }
.mp-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.mp-dropdown { width:220px; background:#3E3D64; border:1px solid #8687A8; border-radius:0 0 24px 24px; overflow:hidden; }
.mp-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; gap:10px; cursor:pointer; font-size:15px; font-weight:600; line-height:22px; color:#FAF9F9; }
.mp-row:not(:last-child) { border-bottom:0.5px solid rgba(255,255,255,0.1); }
.mp-row:active { background:rgba(255,255,255,0.07); }
.mp-row.danger { color:#F1665C; }
.mp-backdrop { position:absolute; inset:0; z-index:490; display:none; }
.mp-backdrop.open { display:block; }

/* ── Bottom nav bar ── */
.bottom-bar { flex-shrink:0; display:flex; align-items:center; justify-content:space-around; padding:16px 24px 24px; background:#3E3D64; border-radius:32px 32px 0 0; box-shadow:0 -8px 8px rgba(0,0,0,0.15); z-index:50; }
.btab { display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; min-width:40px; }
.btab-label { font-size:12px; font-weight:400; line-height:16px; color:#BBBCD6; text-align:center; }
.btab.active .btab-label { font-weight:700; color:#FAF9F9; }
.btab-record-pill { background:#29284B; border-radius:256px; padding:8px 16px; display:flex; align-items:center; justify-content:center; cursor:pointer; }

/* ── iOS action sheet ── */
.as-backdrop {
  position:absolute; inset:0; z-index:400;
  display:flex; align-items:flex-end;
  pointer-events:none; background:rgba(0,0,0,0);
  transition:background .25s;
}
.as-backdrop.open { pointer-events:all; background:rgba(0,0,0,0.45); }
.action-sheet { width:100%; padding:0 8px 8px; display:flex; flex-direction:column; gap:8px; transform:translateY(100%); transition:transform .3s cubic-bezier(0.32,0.72,0,1); }
.as-backdrop.open .action-sheet { transform:translateY(0); }
.as-group { background:#29284B; border-radius:16px; overflow:hidden; }
.as-context { padding:12px 16px 10px; font-size:13px; font-weight:400; color:rgba(250,249,249,0.38); line-height:18px; text-align:center; border-bottom:0.5px solid rgba(255,255,255,0.08); }
.as-row { display:flex; align-items:center; justify-content:center; padding:16px; cursor:pointer; font-size:17px; font-weight:400; line-height:22px; color:#FAF9F9; }
.as-row:not(:last-child) { border-bottom:0.5px solid rgba(255,255,255,0.08); }
.as-row:active { background:rgba(255,255,255,0.07); }
.as-row.danger { color:#F1665C; }
.as-row.cancel { font-weight:600; }

/* ── Recently deleted / Favourites screen ── */
.rd-screen { position:absolute; inset:0; background:#161431; display:flex; flex-direction:column; z-index:200; transform:translateX(100%); transition:transform .28s cubic-bezier(0.32,0.72,0,1); will-change:transform; }
.rd-screen.open { transform:translateX(0); }
.rd-statusbar { flex-shrink:0; height:54px; display:flex; align-items:center; justify-content:space-between; padding:14px 28px 0; }
.rd-header { flex-shrink:0; display:flex; align-items:center; gap:12px; padding:8px 16px 12px; }
.rd-back-btn { width:36px; height:36px; border-radius:256px; background:#F1665C; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.rd-back-btn:active { opacity:0.8; }
.rd-page-title { font-size:16px; font-weight:600; line-height:22px; color:#FAF9F9; }
.rd-scroll { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.rd-scroll::-webkit-scrollbar { display:none; }
.rd-content { padding:8px 15px 32px; }
.rd-empty { padding:64px 0; text-align:center; font-size:14px; color:rgba(250,249,249,0.3); line-height:20px; }
.rd-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }

/* RD tabs */
.rd-tab { flex:1; text-align:center; padding:10px 4px 9px; font-size:13px; font-weight:600; color:rgba(250,249,249,0.38); cursor:pointer; position:relative; }
.rd-tab.active { color:#F1665C; }
.rd-tab.active::after { content:''; position:absolute; bottom:-0.5px; left:0; right:0; height:2px; background:#F1665C; border-radius:2px 2px 0 0; }

/* RD card */
.rd-card { position:relative; aspect-ratio:77/134; border-radius:4px; overflow:hidden; background:#0d0b1e; cursor:pointer; transition:opacity .15s; }
.rd-card img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; filter:saturate(0.25); }
.rd-days { position:absolute; bottom:5px; left:5px; font-family:'Roboto Mono',monospace; font-size:11px; color:rgba(250,249,249,0.65); text-shadow:0 0 6px rgba(0,0,0,.8); pointer-events:none; background:rgba(0,0,0,0.3); padding:1px 3px; border-radius:3px; }
.rd-days.urgent { color:#F1665C; }
.rd-card.pressing { opacity:0.55; }
.rd-card-overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center; gap:8px; background:rgba(22,20,49,0.55); pointer-events:none; z-index:2; }
.rd-card.pressing .rd-card-overlay { display:flex; }
.rd-ov-btn { width:28px; height:28px; border-radius:256px; display:flex; align-items:center; justify-content:center; }
.rd-ov-btn.restore-ov { background:rgba(250,249,249,0.2); }
.rd-ov-btn.del-ov { background:rgba(241,102,92,0.25); }

/* ── Preview screen ── */
.preview-screen { position:absolute; inset:0; background:#000; display:flex; flex-direction:column; z-index:210; transform:translateX(100%); transition:transform .28s cubic-bezier(0.32,0.72,0,1); will-change:transform; border-radius:50px; overflow:hidden; touch-action:none; }
.preview-screen.open { transform:translateX(0); }
.pv-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block; }
.pv-vignette { position:absolute; inset:0; pointer-events:none; background:linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 16%, rgba(0,0,0,0) 58%, rgba(0,0,0,0.75) 100%); }
.pv-status { position:absolute; top:0; left:0; right:0; height:54px; display:flex; align-items:center; justify-content:space-between; padding:0 28px; z-index:5; }

/* Top row: back button sits below status bar */
.pv-top-row { position:absolute; top:54px; left:0; right:0; height:52px; display:flex; align-items:center; justify-content:space-between; padding:8px 16px; z-index:15; }
.pv-back-inline { width:36px; height:36px; border-radius:256px; background:#F1665C; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.pv-back-inline:active { opacity:0.8; }

/* Nav chevrons */
.pv-nav-prev, .pv-nav-next { position:absolute; top:50%; transform:translateY(-50%); width:36px; height:36px; border-radius:256px; background:rgba(22,20,49,0.55); display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:15; opacity:0.7; transition:opacity .15s; }
.pv-nav-prev { left:12px; }
.pv-nav-next { right:12px; }
.pv-nav-prev:active, .pv-nav-next:active { opacity:1; }
.pv-nav-prev.hidden, .pv-nav-next.hidden { opacity:0; pointer-events:none; }

/* Play controls */
.pv-controls { position:absolute; bottom:0; left:0; right:0; padding:0 16px 48px; display:flex; flex-direction:column; gap:12px; z-index:5; }
.pv-play-row { display:flex; align-items:center; width:100%; position:relative; }
.pv-pill { width:36px; height:36px; border-radius:256px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
.pv-pill.red { background:#F1665C; }
.pv-pill.dark { background:#161431; }
.pv-pill:active { opacity:0.75; }
.pv-progress { flex:1; height:32px; display:flex; align-items:center; padding:0 8px; cursor:pointer; }
.pv-track { width:100%; height:3px; background:rgba(255,255,255,0.25); border-radius:2px; position:relative; }
.pv-fill { height:100%; border-radius:2px; background:#FAF9F9; width:0%; position:relative; transition:width .1s linear; }
.pv-thumb { position:absolute; right:-5px; top:50%; transform:translateY(-50%); width:10px; height:10px; border-radius:50%; background:#FAF9F9; box-shadow:0 0 4px rgba(0,0,0,0.4); }
.pv-meta { display:flex; align-items:center; justify-content:space-between; width:100%; }
.pv-date { font-family:'Roboto Mono',monospace; font-size:14px; font-weight:700; line-height:20px; color:#FAF9F9; white-space:nowrap; flex:1; }
.pv-badge { background:rgba(22,20,49,0.72); border-radius:256px; padding:4px 8px; flex-shrink:0; }
.pv-badge span { font-family:'Roboto Mono',monospace; font-size:14px; font-weight:400; line-height:20px; color:#FAF9F9; white-space:nowrap; }

/* Contextual dropdown — anchored above the ellipsis pill */
.pv-ctx {
  position:absolute; right:0; bottom:calc(100% + 8px);
  width:220px; background:#3E3D64; border:1px solid #8687A8; border-radius:24px; overflow:hidden;
  box-shadow:0 -8px 32px rgba(0,0,0,0.55); z-index:30;
  transform-origin:bottom right; transform:scale(0.88); opacity:0; pointer-events:none;
  transition:transform .16s cubic-bezier(0.34,1.4,0.64,1), opacity .12s;
}
.pv-ctx.open { transform:scale(1); opacity:1; pointer-events:all; }
.pv-ctx-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; gap:10px; cursor:pointer; }
.pv-ctx-row:not(:last-child) { border-bottom:0.5px solid rgba(255,255,255,0.1); }
.pv-ctx-row:active { background:rgba(255,255,255,0.07); }
.pv-ctx-label { font-size:15px; font-weight:600; line-height:22px; color:#FAF9F9; flex:1; }
.pv-ctx-row.danger .pv-ctx-label { color:#F1665C; }
.pv-ctx-backdrop { position:absolute; inset:0; z-index:28; display:none; }
.pv-ctx-backdrop.open { display:block; }

/* ── Toast ── */
.toast { position:absolute; bottom:108px; left:50%; transform:translateX(-50%) translateY(8px); background:#29284B; border:0.5px solid rgba(255,255,255,0.12); border-radius:256px; padding:10px 20px; font-size:14px; font-weight:600; color:#FAF9F9; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .2s, transform .2s; z-index:600; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (prefers-reduced-motion:reduce) {
  .rd-screen, .preview-screen, .action-sheet, .as-backdrop, .pv-ctx, .shot-card, .toast { transition:none; }
}

</style>
</head>

// ── Data ──────────────────────────────────────────────────────────────────────
const ALL_SHOTS = [

let activeShots  = ALL_SHOTS.map(s => ({...s}));

// ── Helpers ───────────────────────────────────────────────────────────────────

function mk(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

// DS Cover badge: success (mint), loading (white), error (red), null (no badge)
function shotBadge(status) {
  if (!status) return '<div class="shot-badge empty"></div>';
  const icons = {
    success: `<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
    loading: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5v2M7 10.5v2M1.5 7h2M10.5 7h2M3.2 3.2l1.4 1.4M9.4 9.4l1.4 1.4M3.2 10.8l1.4-1.4M9.4 4.6l1.4-1.4" stroke="#161431" stroke-width="1.4" stroke-linecap="round"/></svg>`,
    error:   `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg>`,
  };
  return `<div class="shot-badge ${status}">${icons[status] || ''}</div>`;
}

// Icon SVGs for dropdown rows
const ICONS = {
  upload: `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 11.5V3M9 3L6 6M9 3l3 3" stroke="rgba(250,249,249,0.65)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13v1a1.5 1.5 0 001.5 1.5h9A1.5 1.5 0 0015 14v-1" stroke="rgba(250,249,249,0.65)" stroke-width="1.4" stroke-linecap="round"/></svg>`,

    : `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 15S2.5 10.5 2.5 6a3.5 3.5 0 016.5-1.8A3.5 3.5 0 0115.5 6c0 4.5-6.5 9-6.5 9z" stroke="rgba(250,249,249,0.65)" stroke-width="1.4" stroke-linejoin="round"/></svg>`,
  trash:  `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2.25 4.5h13.5M6 4.5V3.75A1.5 1.5 0 017.5 2.25h3A1.5 1.5 0 0112 3.75V4.5M14.25 4.5l-.75 10.5A1.5 1.5 0 0112 16.5H6a1.5 1.5 0 01-1.5-1.5L3.75 4.5" stroke="#F1665C" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
};

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}


// ── Render ────────────────────────────────────────────────────────────────────

function renderShots() {
  const wrap = document.getElementById('events-wrap');
  wrap.innerHTML = '';

  // Group by event then date
  const byEvent = {};
  activeShots.forEach(v => {
    (byEvent[v.event] = byEvent[v.event] || {})[v.date] = [...(byEvent[v.event][v.date] || []), v];
  });

  const eventKeys = Object.keys(byEvent).sort((a, b) => {
    const latestA = Math.max(...Object.keys(byEvent[a]).map(d => +new Date(d)));
    const latestB = Math.max(...Object.keys(byEvent[b]).map(d => +new Date(d)));
    return latestB - latestA;
  });

  if (!eventKeys.length) {
    wrap.innerHTML = '<p style="padding:24px 0;font-size:14px;color:rgba(250,249,249,0.3)">No shots yet.</p>';
    return;
  }

  eventKeys.forEach(eventName => {
    const dateMap     = byEvent[eventName];
    const sortedDates = Object.keys(dateMap).sort((a, b) => +new Date(b) - +new Date(a));
    const group = mk('div', 'event-group');

    const hdr = mk('div', 'event-group-header');
    const nm  = mk('span', 'event-group-name');
    nm.textContent = eventName;
    const ab = mk('div', 'add-videos-btn');
    ab.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="#F1665C" stroke-width="1.8" stroke-linecap="round"/></svg><span>Add videos</span>`;
    hdr.appendChild(nm);
    hdr.appendChild(ab);
    group.appendChild(hdr);

    sortedDates.forEach(dateStr => {
      const shots = dateMap[dateStr];
      const d     = new Date(dateStr + 'T12:00:00');
      const dg    = mk('div', 'date-group');

      const dr = mk('div', 'date-row');
      dr.innerHTML = `<span>${d.toLocaleDateString('en-GB', {weekday:'long'})}</span><span>${d.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'}).replace(/\//g, '.')}</span>`;
      dg.appendChild(dr);

      const grid = mk('div', 'shot-grid');
      shots.forEach(v => {
        const wrap2 = mk('div', 'shot-card-wrap');
        const card  = mk('div', 'shot-card');
        card.dataset.id = v.id;
        card.innerHTML = `<img src="${v.thumb}" alt="" loading="lazy">${shotBadge(v.uploadStatus)}<span class="shot-dur">${v.dur}</span>`;
        wrap2.appendChild(card);
        attachActiveHandlers(wrap2, card, v, grid);
        grid.appendChild(wrap2);
      });

      dg.appendChild(grid);
      group.appendChild(dg);
    });

    wrap.appendChild(group);
  });
}

function renderDeleted() {
  const grid  = document.getElementById('rd-grid');
  const empty = document.getElementById('rd-empty');
  grid.innerHTML = '';

  if (!deletedItems.length) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Oldest first — soonest to expire at top
  [...deletedItems].sort((a, b) => a.deletedAt - b.deletedAt).forEach(item => {
    const msLeft   = (item.deletedAt + 30 * 86400000) - Date.now();
    const daysLeft = Math.max(1, Math.ceil(msLeft / 86400000));
    const urgent   = daysLeft <= 3;

    const card = mk('div', 'rd-card');
    card.dataset.id = item.id;
    card.innerHTML = `
      <img src="${item.thumb}" alt="" loading="lazy">
      <span class="rd-days${urgent ? ' urgent' : ''}">${daysLeft}d</span>
      <div class="rd-card-overlay">
        <div class="rd-ov-btn restore-ov"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7a5 5 0 1 0 1.5-3.5" stroke="rgba(250,249,249,0.9)" stroke-width="1.4" stroke-linecap="round"/><path d="M2 3.5V7h3.5" stroke="rgba(250,249,249,0.9)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="rd-ov-btn del-ov"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1.75 3.5h10.5M4.667 3.5V2.917A1.167 1.167 0 015.833 1.75h2.334A1.167 1.167 0 019.333 2.917V3.5M11.083 3.5l-.583 8.167a1.167 1.167 0 01-1.167 1.166H4.667A1.167 1.167 0 013.5 11.667L2.917 3.5" stroke="#F1665C" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>`;
    attachDeletedHandlers(card, item);
    grid.appendChild(card);
  });
}

function renderFavourites() {
  const grid  = document.getElementById('rd-fav-grid');
  const empty = document.getElementById('rd-fav-empty');
  grid.innerHTML = '';

  const favs = activeShots.filter(s => s.favourite);
  if (!favs.length) {
    empty.style.display = 'block';
    grid.style.display  = 'none';
    return;
  }
  empty.style.display = 'none';
  grid.style.display  = '';

  favs.forEach(shot => {
    const wrap = mk('div', 'shot-card-wrap');
    const card = mk('div', 'shot-card');
    card.dataset.id = shot.id;
    card.innerHTML = `<img src="${shot.thumb}" alt="" loading="lazy"><span class="shot-dur">${shot.dur}</span>`;
    card.addEventListener('click', () => { closeRecentlyDeleted(); openPreview(shot); });
    wrap.appendChild(card);
    grid.appendChild(wrap);
  });
}

function renderAll() { renderShots(); renderDeleted(); }


// ── Card interaction handlers ─────────────────────────────────────────────────

function attachActiveHandlers(wrap, card, shot, grid) {
  let pressTimer = null;
  let didLong    = false;

  card.addEventListener('pointerdown', () => {
    didLong = false;
    pressTimer = setTimeout(() => {
      pressTimer = null;
      didLong    = true;
      wrap.classList.add('pressing');
      grid.classList.add('has-press');
      openMiniPreview(shot, wrap);
    }, 450);
  });

  const release = () => {
    clearTimeout(pressTimer);
    pressTimer = null;
    wrap.classList.remove('pressing');
    grid.classList.remove('has-press');
  };

  card.addEventListener('pointerup',     () => { release(); didLong = false; });
  card.addEventListener('pointercancel', () => { release(); didLong = false; });
  card.addEventListener('click',         () => { if (!didLong) openPreview(shot); });
}

function attachDeletedHandlers(card, item) {
  let pressTimer = null;
  let didLong    = false;

  card.addEventListener('pointerdown', () => {
    didLong = false;
    pressTimer = setTimeout(() => { pressTimer = null; didLong = true; card.classList.add('pressing'); }, 450);
  });

  const release = () => { clearTimeout(pressTimer); pressTimer = null; card.classList.remove('pressing'); };

  card.addEventListener('pointerup',     () => { release(); didLong = false; });
  card.addEventListener('pointercancel', () => { release(); didLong = false; });
  card.querySelector('.restore-ov').addEventListener('pointerup', e => { e.stopPropagation(); release(); restoreShot(item.id); });
  card.querySelector('.del-ov').addEventListener('pointerup',     e => { e.stopPropagation(); release(); showPermDeleteSheet(item.id); });
}


// ── Mini-preview ──────────────────────────────────────────────────────────────

let mpShot = null;

function openMiniPreview(shot, wrapEl) {
  mpShot = shot;
  document.getElementById('mp-img').src = shot.thumb;

  // Populate dropdown
  const rows = buildMenuRows(shot, () => { closeMiniPreview(); showDeleteSheet(shot); });
  const container = document.getElementById('mp-dropdown');
  container.innerHTML = '';
  rows.forEach((r, i) => {
    const row = mk('div', 'mp-row' + (r.danger ? ' danger' : ''));
    row.innerHTML = `<span>${r.label}</span>${r.icon}`;
    if (i < rows.length - 1) row.style.borderBottom = '0.5px solid rgba(255,255,255,0.1)';
    if (r.action) row.addEventListener('click', r.action);
    container.appendChild(row);
  });

  // Position: centre on card, prefer above, clamp within phone
  const phone     = document.getElementById('phone');
  const phoneRect = phone.getBoundingClientRect();
  const wrapRect  = wrapEl.getBoundingClientRect();
  const mpW = 220;
  const mpH = 300 + rows.length * 48;

  let left = (wrapRect.left - phoneRect.left) + (wrapRect.width / 2) - (mpW / 2);
  left = Math.max(8, Math.min(left, phoneRect.width - mpW - 8));

  let top = (wrapRect.top - phoneRect.top) - mpH - 8;
  if (top < 60) top = (wrapRect.bottom - phoneRect.top) + 8;
  top = Math.max(60, Math.min(top, phoneRect.height - mpH - 90));

  const mp = document.getElementById('mini-preview');
  mp.style.left = left + 'px';
  mp.style.top  = top  + 'px';
  mp.classList.add('open');
  document.getElementById('mp-backdrop').classList.add('open');
}

function closeMiniPreview() {
  document.querySelectorAll('.shot-card-wrap.pressing').forEach(w => {
    w.classList.remove('pressing');
    w.closest('.shot-grid')?.classList.remove('has-press');
  });
  document.getElementById('mini-preview').classList.remove('open');
  document.getElementById('mp-backdrop').classList.remove('open');
  mpShot = null;
}

// Shared menu row builder (used by both mini-preview and preview ctx)
function buildMenuRows(shot, onDelete) {
  const rows = [];
  if (!shot.uploadStatus) rows.push({ label:'Upload to event',   icon:ICONS.upload,           action:() => {} });
  rows.push(                         { label:'Share',             icon:ICONS.share,            action:() => {} });
  rows.push(                         { label:'Save to camera roll',icon:ICONS.save,            action:() => {} });
  rows.push(                         { label: shot.favourite ? 'Unfavourite' : 'Favourite', icon:ICONS.heart(shot.favourite), action:() => {
    const s = activeShots.find(x => x.id === shot.id);
    if (s) { s.favourite = !s.favourite; renderShots(); pvBuildOptionsCtx(s); }
  }});
  rows.push(                         { label:'Delete', icon:ICONS.trash, danger:true, action:onDelete });
  return rows;
}


// ── Action sheets (grid long-press delete) ────────────────────────────────────

function showDeleteSheet(shot) {
  const sheet = document.getElementById('action-sheet');
  if (shot.inCollection) {
    sheet.innerHTML = `
      <div class="as-group">
        <div class="as-context">This shot is in an organiser's collection.</div>
        <div class="as-row danger" id="_as1">Delete and let organiser keep it</div>
        <div class="as-row danger" id="_as2">Delete from everywhere</div>
      </div>
      <div class="as-group"><div class="as-row cancel" id="_as3">Cancel</div></div>`;
    sheet.querySelector('#_as1').onclick = () => { closeSheet(); softDelete(shot.id); };
    sheet.querySelector('#_as2').onclick = () => { closeSheet(); softDelete(shot.id); };
    sheet.querySelector('#_as3').onclick = closeSheet;
  } else {
    sheet.innerHTML = `
      <div class="as-group"><div class="as-row danger" id="_as1">Delete</div></div>
      <div class="as-group"><div class="as-row cancel" id="_as2">Cancel</div></div>`;
    sheet.querySelector('#_as1').onclick = () => { closeSheet(); softDelete(shot.id); };
    sheet.querySelector('#_as2').onclick = closeSheet;
  }
  openSheet();
}

function showPermDeleteSheet(id) {
  const sheet = document.getElementById('action-sheet');
  sheet.innerHTML = `
    <div class="as-group"><div class="as-row danger" id="_as1">Delete permanently</div></div>
    <div class="as-group"><div class="as-row cancel" id="_as2">Cancel</div></div>`;
  sheet.querySelector('#_as1').onclick = () => { closeSheet(); permDelete(id); };
  sheet.querySelector('#_as2').onclick = closeSheet;
  openSheet();
}

function openSheet()  { document.getElementById('as-backdrop').classList.add('open'); }
function closeSheet() { document.getElementById('as-backdrop').classList.remove('open'); }
function asBackdropTap(e) { if (e.target === document.getElementById('as-backdrop')) closeSheet(); }


// ── Data operations ───────────────────────────────────────────────────────────

function softDelete(id) {
  const i = activeShots.findIndex(s => s.id === id);
  if (i === -1) return;
  const [item] = activeShots.splice(i, 1);
  deletedItems.push({...item, deletedAt: Date.now()});
  renderAll();
  // If the deleted shot is currently open in preview, navigate to adjacent or close
  if (pvShot && pvShot.id === id) {
    const list = pvShotList();
    if (!list.length) { closePreview(); return; }
    pvIndex = Math.min(pvIndex, list.length - 1);
    pvLoadShot(list[pvIndex]);
  }
}

function restoreShot(id) {
  const i = deletedItems.findIndex(s => s.id === id);
  if (i === -1) return;
  const [item] = deletedItems.splice(i, 1);
  delete item.deletedAt;
  activeShots.push(item);
  renderAll();
}

function permDelete(id) {
  deletedItems = deletedItems.filter(s => s.id !== id);
  renderDeleted();
}


// ── Recently deleted / Favourites ─────────────────────────────────────────────

function revealRecentlyDeleted() {
  rdSwitchTab('deleted');
  renderDeleted();
  document.getElementById('rd-screen').classList.add('open');
}

function closeRecentlyDeleted() {
  document.getElementById('rd-screen').classList.remove('open');
}

function rdSwitchTab(tab) {
  document.getElementById('rd-tab-deleted').classList.toggle('active', tab === 'deleted');
  document.getElementById('rd-tab-favs').classList.toggle('active',   tab === 'favs');
  document.getElementById('rd-panel-deleted').style.display = tab === 'deleted' ? '' : 'none';
  document.getElementById('rd-panel-favs').style.display    = tab === 'favs'    ? '' : 'none';
  if (tab === 'favs') renderFavourites();
}


// ── Preview ───────────────────────────────────────────────────────────────────

let pvShot    = null;
let pvPlaying = false;
let pvIndex   = 0;

// Returns shots sorted identically to the grid (newest event group first, newest date first within)
function pvShotList() {
  return [...activeShots].sort((a, b) => {
    const aDate     = +new Date(a.date);
    const bDate     = +new Date(b.date);
    if (a.event === b.event) return bDate - aDate;
    const aEventMax = Math.max(...activeShots.filter(s => s.event === a.event).map(s => +new Date(s.date)));
    const bEventMax = Math.max(...activeShots.filter(s => s.event === b.event).map(s => +new Date(s.date)));
    if (aEventMax !== bEventMax) return bEventMax - aEventMax;
    return bDate - aDate;
  });
}

function openPreview(shot) {
  const list = pvShotList();
  pvIndex = list.findIndex(s => s.id === shot.id);
  pvLoadShot(list[pvIndex]);
  document.getElementById('preview-screen').classList.add('open');
  swipeReset();
}

function pvLoadShot(shot) {
  pvShot = shot;
  const v = document.getElementById('pv-video');
  v.pause(); v.src = shot.src || ''; v.load();
  v.play().catch(() => {});
  pvPlaying = true;
  document.getElementById('pv-icon-play').style.display  = 'none';
  document.getElementById('pv-icon-pause').style.display = '';
  document.getElementById('pv-fill').style.width = '0%';

  const d = new Date(shot.date + 'T12:00:00');
  document.getElementById('pv-date').textContent =
    `${d.toLocaleDateString('en-GB', {weekday:'long'})} ${d.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit', year:'2-digit'}).replace(/\//g, '.')}  00:00h`;
  document.getElementById('pv-event').textContent = shot.event;
  document.getElementById('pv-badge').style.display = shot.uploadStatus === 'success' ? '' : 'none';

  pvBuildOptionsCtx(shot);
  pvUpdateChevrons();
}

function pvUpdateChevrons() {
  const list = pvShotList();
  document.getElementById('pv-nav-prev').classList.toggle('hidden', pvIndex === 0);
  document.getElementById('pv-nav-next').classList.toggle('hidden', pvIndex === list.length - 1);
}

function pvNavPrev() {
  if (pvIndex <= 0) return;
  pvCloseCtx();
  pvIndex--;
  pvLoadShot(pvShotList()[pvIndex]);
}

function pvNavNext() {
  const list = pvShotList();
  if (pvIndex >= list.length - 1) return;
  pvCloseCtx();
  pvIndex++;
  pvLoadShot(list[pvIndex]);
}

function closePreview() {
  pvCloseCtx();
  swipeReset();
  const v = document.getElementById('pv-video');
  v.pause(); v.src = '';
  pvPlaying = false;
  document.getElementById('pv-icon-play').style.display  = '';
  document.getElementById('pv-icon-pause').style.display = 'none';
  document.getElementById('preview-screen').classList.remove('open');
  pvShot = null;
  const peek = document.getElementById('pv-peek');
  if (peek) peek.remove();
}

function pvTogglePlay() {
  const v = document.getElementById('pv-video');
  pvPlaying = !pvPlaying;
  if (pvPlaying) {
    v.play();
    document.getElementById('pv-icon-play').style.display  = 'none';
    document.getElementById('pv-icon-pause').style.display = '';
  } else {
    v.pause();
    document.getElementById('pv-icon-play').style.display  = '';
    document.getElementById('pv-icon-pause').style.display = 'none';
  }
}

document.getElementById('pv-video').addEventListener('timeupdate', () => {
  const v = document.getElementById('pv-video');
  if (!v.duration) return;
  document.getElementById('pv-fill').style.width = (v.currentTime / v.duration * 100) + '%';
});

function pvScrub(e) {
  const v   = document.getElementById('pv-video');
  const bar = document.getElementById('pv-progress');
  const pct = Math.max(0, Math.min(1, (e.clientX - bar.getBoundingClientRect().left) / bar.offsetWidth));
  if (v.duration) v.currentTime = pct * v.duration;
}


// ── Preview contextual dropdown ───────────────────────────────────────────────

function pvBuildOptionsCtx(shot) {
  const ctx  = document.getElementById('pv-ctx');
  const rows = buildMenuRows(shot, () => pvShowDeleteConfirm(shot));
  ctx.innerHTML = '';
  rows.forEach((r, i) => {
    const row = mk('div', 'pv-ctx-row' + (r.danger ? ' danger' : ''));
    row.innerHTML = `<span class="pv-ctx-label">${r.label}</span>${r.icon}`;
    if (i < rows.length - 1) row.style.borderBottom = '0.5px solid rgba(255,255,255,0.1)';
    if (r.action) row.addEventListener('click', e => { e.stopPropagation(); r.action(); });
    ctx.appendChild(row);
  });
}

function pvShowDeleteConfirm(shot) {
  const ctx = document.getElementById('pv-ctx');
  ctx.innerHTML = '';

  const centredRow = (label, danger, action) => {
    const row = mk('div', 'pv-ctx-row' + (danger ? ' danger' : ''));
    row.style.justifyContent = 'center';
    row.innerHTML = `<span class="pv-ctx-label" style="flex:none;text-align:center">${label}</span>`;
    row.addEventListener('click', e => { e.stopPropagation(); action(); });
    return row;
  };

  const para = mk('div');
  para.style.cssText = 'padding:14px 16px 12px;font-size:13px;font-weight:400;color:rgba(250,249,249,0.55);line-height:18px;border-bottom:0.5px solid rgba(255,255,255,0.08);text-align:center;';

  if (shot.inCollection) {
    para.textContent = 'Your clip was used in a collection. You can donate it to the organiser to keep it in the collection anonymously, or delete it entirely.';
    ctx.appendChild(para);

    const donate = centredRow('Donate and delete', false, () => { pvCloseCtx(); softDelete(shot.id); showToast('Thanks for donating your clip.'); });
    donate.style.borderBottom = '0.5px solid rgba(255,255,255,0.1)';
    ctx.appendChild(donate);

    const del = centredRow('Delete', true, () => { pvCloseCtx(); softDelete(shot.id); });
    del.style.borderBottom = '0.5px solid rgba(255,255,255,0.08)';
    ctx.appendChild(del);
  } else {
    para.textContent = 'This shot will be stored for 30 days, then permanently deleted. You can restore it from your account settings before then.';
    ctx.appendChild(para);

    const del = centredRow('Delete', true, () => { pvCloseCtx(); softDelete(shot.id); });
    del.style.borderBottom = '0.5px solid rgba(255,255,255,0.08)';
    ctx.appendChild(del);
  }

  ctx.appendChild(centredRow('Cancel', false, () => pvBuildOptionsCtx(shot)));
}

function pvToggleCtx() {
  const ctx = document.getElementById('pv-ctx');
  if (ctx.classList.contains('open')) { pvCloseCtx(); }
  else {
    ctx.classList.add('open');
    document.getElementById('pv-ctx-backdrop').classList.add('open');
  }
}

function pvCloseCtx() {
  document.getElementById('pv-ctx').classList.remove('open');
  document.getElementById('pv-ctx-backdrop').classList.remove('open');
}


// ── Swipe gesture ─────────────────────────────────────────────────────────────

const SWIPE_THRESHOLD = 0.28; // fraction of width to commit
const SWIPE_VELOCITY  = 0.35; // px/ms — fast flick commits regardless of distance

const swipe = { active:false, startX:0, startY:0, startT:0, dx:0, axis:null, screenW:393 };

function swipeReset() {
  const video = document.getElementById('pv-video');
  video.style.transition = '';
  video.style.transform  = '';
  const peek = document.getElementById('pv-peek');
  if (peek) { peek.style.transition = ''; peek.style.transform = ''; }
  swipe.active = false;
  swipe.axis   = null;
  swipe.dx     = 0;
}

function pvSwipeStart(e) {
  if (e.target.closest('.pv-controls,.pv-back-inline,.pv-ctx,.pv-ctx-backdrop')) return;
  const t = e.touches ? e.touches[0] : e;
  Object.assign(swipe, { startX:t.clientX, startY:t.clientY, startT:Date.now(), dx:0, axis:null, active:true });
  swipe.screenW = document.getElementById('preview-screen').offsetWidth || 393;
  document.getElementById('pv-video').style.transition = 'none';
  if (e.pointerId != null) { try { e.target.setPointerCapture(e.pointerId); } catch(_){} }
}

function pvSwipeMove(e) {
  if (!swipe.active) return;
  const t  = e.touches ? e.touches[0] : e;
  const dx = t.clientX - swipe.startX;
  const dy = t.clientY - swipe.startY;

  if (!swipe.axis) {
    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) swipe.axis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    return;
  }
  if (swipe.axis !== 'h') return;

  e.preventDefault();
  swipe.dx = dx;

  const list    = pvShotList();
  const hasNext = pvIndex < list.length - 1;
  const hasPrev = pvIndex > 0;

  // Rubber-band at edges
  let tx = dx;
  if ((dx < 0 && !hasNext) || (dx > 0 && !hasPrev)) tx = dx * 0.18;

  document.getElementById('pv-video').style.transform = `translateX(${tx}px)`;

  // Peek thumbnail
  const adjIndex = dx < 0 ? pvIndex + 1 : pvIndex - 1;
  const adjShot  = (adjIndex >= 0 && adjIndex < list.length) ? list[adjIndex] : null;
  let peek = document.getElementById('pv-peek');

  if (adjShot && Math.abs(tx) > 8) {
    if (!peek) {
      peek = document.createElement('div');
      peek.id = 'pv-peek';
      peek.style.cssText = 'position:absolute;inset:0;z-index:3;pointer-events:none;background-size:cover;background-position:center;background-color:#0d0b1e;transition:none;';
      document.getElementById('preview-screen').appendChild(peek);
    }
    peek.style.backgroundImage = `url('${adjShot.thumb}')`;
    peek.style.transform = `translateX(${(dx < 0 ? swipe.screenW : -swipe.screenW) + tx}px)`;
  } else if (peek && Math.abs(tx) <= 8) {
    peek.style.transform = `translateX(${dx < 0 ? swipe.screenW : -swipe.screenW}px)`;
  }
}

function pvSwipeEnd() {
  if (!swipe.active || swipe.axis !== 'h') { swipe.active = false; swipe.axis = null; return; }
  swipe.active = false;

  const dt       = Date.now() - swipe.startT;
  const velocity = Math.abs(swipe.dx) / dt;
  const frac     = Math.abs(swipe.dx) / swipe.screenW;
  const goNext   = swipe.dx < 0;
  const list     = pvShotList();
  const canGo    = goNext ? pvIndex < list.length - 1 : pvIndex > 0;
  const commit   = canGo && (frac > SWIPE_THRESHOLD || velocity > SWIPE_VELOCITY);

  const video = document.getElementById('pv-video');
  const peek  = document.getElementById('pv-peek');
  const dur   = '0.28s cubic-bezier(0.32,0.72,0,1)';

  if (commit) {
    const exitX = goNext ? -swipe.screenW : swipe.screenW;
    video.style.transition = `transform ${dur}`;
    video.style.transform  = `translateX(${exitX}px)`;
    if (peek) { peek.style.transition = `transform ${dur}`; peek.style.transform = 'translateX(0)'; }
    setTimeout(() => {
      pvCloseCtx();
      pvIndex = goNext ? pvIndex + 1 : pvIndex - 1;
      pvLoadShot(list[pvIndex]);
      video.style.transition = 'none';
      video.style.transform  = '';
      if (peek) peek.remove();
    }, 280);
  } else {
    video.style.transition = `transform ${dur}`;
    video.style.transform  = 'translateX(0)';
    if (peek) {
      peek.style.transition = `transform ${dur}`;
      peek.style.transform  = `translateX(${goNext ? swipe.screenW : -swipe.screenW}px)`;
      setTimeout(() => { if (peek.parentNode) peek.remove(); }, 300);
    }
  }
  swipe.axis = null;
}

// Attach swipe listeners — pointer capture ensures tracking outside element bounds (desktop fix)
(function () {
  const ps = document.getElementById('preview-screen');
  ps.addEventListener('pointerdown', e => {
    pvSwipeStart(e);
    if (swipe.active && e.pointerId != null) { try { ps.setPointerCapture(e.pointerId); } catch(_){} }
  }, { passive:true });
  ps.addEventListener('pointermove',   pvSwipeMove, { passive:false });
  ps.addEventListener('pointerup',     pvSwipeEnd,  { passive:true });
  ps.addEventListener('pointercancel', () => { swipe.active = false; swipe.axis = null; swipeReset(); }, { passive:true });
})();


// ── Init ──────────────────────────────────────────────────────────────────────
renderAll();

</script>
